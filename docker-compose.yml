services:
  csm-service:
    build: ./csm-service
    ports:
      - "8001:8001"
    environment:
      - CSM_MOCK=true
      - WHISPER_MODEL=base
      - CSM_MODEL=sesame/csm-1b
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
    volumes:
      - ./csm-service:/app

